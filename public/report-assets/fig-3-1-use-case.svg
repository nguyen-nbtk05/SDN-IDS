<svg xmlns="http://www.w3.org/2000/svg" width="791" height="648" viewBox="0 0 791 648" role="img" aria-labelledby="title desc">
  <title id="title">Sơ đồ Use Case tổng quát của Hệ thống IDS</title>
  <desc id="desc">Sơ đồ ca sử dụng gồm quản trị viên mạng, hệ thống IDS và thiết bị chuyển mạch OpenFlow Switch.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222" />
    </marker>
    <style>
      .line { fill: none; stroke: #222; stroke-width: 1.4; marker-end: url(#arrow); }
      .plain-line { fill: none; stroke: #222; stroke-width: 1.4; }
      .dash { fill: #fff; stroke: #666; stroke-width: 1.4; stroke-dasharray: 8 5; }
      .use-case { fill: #fff; stroke: #555; stroke-width: 1.6; }
      .label { fill: #222; font: 16px "Times New Roman", serif; }
      .small { fill: #222; font: 14px Arial, sans-serif; }
      .system { fill: #555; font: 18px Arial, sans-serif; font-weight: 700; }
      .actor-label { fill: #222; font: 16px "Times New Roman", serif; }
      .server { fill: #f8f8f8; stroke: #222; stroke-width: 1.4; }
      .server-dark { fill: #111; stroke: #222; stroke-width: 1.4; }
      .server-dot { fill: #fff; stroke: #222; stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="791" height="648" fill="#fff" />

  <rect class="dash" x="152" y="19" width="462" height="621" rx="10" />
  <text class="system" x="163" y="627">HỆ THỐNG IDS</text>

  <circle cx="73" cy="256" r="11" fill="#fff" stroke="#222" stroke-width="2.4" />
  <path class="plain-line" d="M 73 267 L 73 329 M 53 303 L 93 303 M 73 329 L 50 363 M 73 329 L 96 363" />
  <text class="actor-label" x="10" y="379">Quản trị viên mạng</text>

  <ellipse class="use-case" cx="384" cy="79" rx="82" ry="40" />
  <text class="label" x="317" y="84">Khởi động hệ thống</text>

  <ellipse class="use-case" cx="384" cy="200" rx="82" ry="40" />
  <text class="label" x="351" y="195">Thu thập</text>
  <text class="label" x="337" y="215">thống kê luồng</text>

  <ellipse class="use-case" cx="384" cy="320" rx="82" ry="40" />
  <text class="label" x="343" y="316">Phân tích &amp;</text>
  <text class="label" x="324" y="335">Tính toán Entropy</text>

  <ellipse class="use-case" cx="384" cy="440" rx="82" ry="40" />
  <text class="label" x="319" y="445">Thực thi ngăn chặn</text>

  <ellipse class="use-case" cx="384" cy="560" rx="82" ry="40" />
  <text class="label" x="315" y="565">Cảnh báo và Lưu vết</text>

  <path class="plain-line" d="M 93 318 L 198 318 L 198 78 L 302 78" marker-end="url(#arrow)" />
  <path class="plain-line" d="M 198 318 L 198 560 L 302 560" marker-end="url(#arrow)" />

  <path class="line" d="M 384 240 L 384 280" />
  <path class="line" d="M 384 360 L 384 400" />
  <path class="line" d="M 384 480 L 384 520" />

  <rect x="413" y="251" width="72" height="18" fill="#fff" stroke="#bbb" stroke-width="1" />
  <text class="small" x="415" y="265">&lt;&lt;include&gt;&gt;</text>
  <rect x="414" y="371" width="70" height="18" fill="#fff" stroke="#bbb" stroke-width="1" />
  <text class="small" x="417" y="385">&lt;&lt;extend&gt;&gt;</text>
  <rect x="414" y="491" width="72" height="18" fill="#fff" stroke="#bbb" stroke-width="1" />
  <text class="small" x="416" y="505">&lt;&lt;include&gt;&gt;</text>

  <path class="plain-line" d="M 466 200 L 570 200 L 570 318 L 674 318" marker-end="url(#arrow)" />
  <path class="plain-line" d="M 466 440 L 716 440 L 716 361" marker-end="url(#arrow)" />
  <text class="small" x="474" y="428">Khi phát hiện tấn công</text>

  <g transform="translate(675 280)">
    <rect class="server" x="0" y="0" width="72" height="11" />
    <circle class="server-dot" cx="7" cy="5.5" r="3" />
    <rect class="server-dark" x="18" y="2" width="47" height="7" />
    <rect class="server" x="0" y="15" width="72" height="11" />
    <circle class="server-dot" cx="7" cy="20.5" r="3" />
    <rect class="server-dark" x="18" y="17" width="47" height="7" />
    <rect class="server" x="0" y="30" width="72" height="11" />
    <circle class="server-dot" cx="7" cy="35.5" r="3" />
    <rect class="server-dark" x="18" y="32" width="47" height="7" />
  </g>
  <text class="actor-label" x="641" y="360">Thiết bị chuyển mạch</text>
  <text class="actor-label" x="651" y="381">(OpenFlow Switch)</text>
</svg>
