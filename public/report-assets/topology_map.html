  <link rel="stylesheet" href="https://unpkg.com/vis-network@9.1.9/styles/vis-network.min.css">
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef5fb;
      --panel: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #d8e3ef;
      --accent: #0ea5e9;
      --danger: #b91c1c;
      --danger-bg: #fff1f2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(14, 165, 233, 0.11), transparent 38%),
        linear-gradient(315deg, rgba(34, 197, 94, 0.09), transparent 32%),
        var(--bg);
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 22px;
      background: rgba(255, 255, 255, 0.9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .stat {
      min-width: 96px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 18px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    main {
      position: relative;
      min-height: 0;
      padding: 14px;
    }

    #network {
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(rgba(148, 163, 184, 0.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.10) 1px, transparent 1px),
        #fbfdff;
      background-size: 40px 40px;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
    }

    .message {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(560px, calc(100% - 48px));
      transform: translate(-50%, -50%);
      padding: 22px;
      border: 1px solid #fecdd3;
      border-radius: 8px;
      background: var(--danger-bg);
      color: var(--danger);
      box-shadow: 0 16px 36px rgba(127, 29, 29, 0.16);
    }

    .message h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .message p {
      margin: 8px 0;
      line-height: 1.5;
    }

    code {
      padding: 2px 5px;
      border-radius: 5px;
      background: rgba(15, 23, 42, 0.08);
      color: #7f1d1d;
      font-size: 0.95em;
    }

    @media (max-width: 720px) {
      header {
        align-items: flex-start;
        flex-direction: column;
        padding: 14px;
      }

      .stats {
        justify-content: flex-start;
        width: 100%;
      }

      .stat {
        flex: 1 1 90px;
      }

      main {
        padding: 10px;
      }

      #network {
        height: 100%;
      }
    }
  </style>
</head>
